name: Hive Telemetry Sync

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Fetch & Process Hive Data
        run: python scripts/fetch_weather.py
        
      - name: Commit Data
        run: |
          git config user.name "BeeBot"
          git config user.email "actions@github.com"
          git add src/data/telemetry.json src/data/archive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update hive telemetry data" && git push)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: sync_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
